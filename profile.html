<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EasyBiome — Perfil</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/header.css" />
</head>

<body>
  <div id="header-container"></div>
  <div class="page">

    <section class="profile-hero">
      <div class="profile-hero-head">
        <div class="profile-hero-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
        </div>
        <div>
          <div id="profile-name" class="profile-hero-name"></div>
          <div id="profile-email" class="profile-hero-email"></div>
        </div>
      </div>

      <a class="profile-action-logout" href="login.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>

        <span>Terminar sessão</span>
      </a>
    </section>

    <div class="profile-stats">

      <div class="profile-stat">
        <div id="stat-terrarios" class="profile-stat-value">0</div>
        <div class="profile-stat-label">Terrários</div>
      </div>

      <div class="profile-stat">
        <div id="stat-leituras" class="profile-stat-value">0</div>
        <div class="profile-stat-label">Leituras hoje</div>
      </div>

      <div class="profile-stat">
        <div id="stat-alerta" class="profile-stat-value">—</div>
        <div class="profile-stat-label">Último alerta</div>
      </div>

      <div class="profile-stat">
        <div id="stat-dias" class="profile-stat-value">0</div>
        <div class="profile-stat-label">Dias de utilização</div>
      </div>

    </div>

    <div class="settings-section" style="margin-top:1.25rem">
      <div class="settings-section-title">Conta</div>
      <div class="settings-group">
        <div class="settings-row">
          <div class="settings-row-left">
            <div class="settings-row-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
              </svg>
            </div>
            <div>
              <div class="settings-row-name">Nome</div>
              <div class="settings-row-sub">Identificação principal</div>
            </div>
          </div>
          <div id="settings-name" class="settings-val"></div>
        </div>
        <div class="settings-row">
          <div class="settings-row-left">
            <div class="settings-row-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M22 6v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6" />
                <path d="M22 6l-10 7L2 6" />
              </svg>
            </div>
            <div>
              <div class="settings-row-name">Email</div>
              <div class="settings-row-sub">Contacto e recuperação</div>
            </div>
          </div>
          <input id="email" class="profile-input" type="email">
        </div>


        <div class="settings-row">
          <div class="settings-row-left">
            <div class="settings-row-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </div>
            <div>
              <div class="settings-row-name">Password</div>
              <div class="settings-row-sub">Última alteração há 22 dias</div>
            </div>
          </div>
          <div class="password-wrapper">

            <input id="password" class="profile-input" type="password" placeholder="********">

            <button id="toggle-password" type="button" class="eye-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">

                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>

          </div>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">
        Os meus terrários
      </div>

      <div id="terrarios-grid" class="terrarios-grid">

      </div>
    </div>
  </div>

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-box">

      <h3 id="modal-title">Guardar alterações?</h3>

      <p id="modal-text">
        Pretende guardar as alterações efetuadas?
      </p>

      <div class="modal-actions">
        <button id="modal-cancel" class="modal-btn cancel">
          Cancelar
        </button>

        <button id="modal-confirm" class="modal-btn confirm">
          Continuar
        </button>
      </div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/terrarios.js"></script>
  <script src="js/picker.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/profile.js"></script>
  <script>
    fetch("header.html")
      .then(r => r.text())
      .then(data => {
        document.getElementById("header-container").innerHTML = data;

        const pagina = window.location.pathname.split("/").pop() || "index.html";

        const titulos = {
          "index.html": "Início",
          "historico.html": "Histórico",
          "atividade.html": "Atividade",
          "alertas.html": "Alertas",
          "definicoes.html": "Definições",
          "profile.html": "Perfil"
        };

        const titulo = document.getElementById("page-title");
        if (titulo) {
          titulo.textContent = titulos[pagina] || "EasyBiome";
        }

        document.querySelectorAll(".desktop-nav-link").forEach(link => {
          if (link.getAttribute("href") === pagina) {
            link.classList.add("active");
          }
        });

        document.querySelectorAll(".bnav-item").forEach(link => {
          if (link.getAttribute("href") === pagina) {
            link.classList.add("active");
          }
        });
      });
  </script>
</body>

</html>
