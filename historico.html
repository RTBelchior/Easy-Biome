<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EasyBiome — Histórico</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/historico.css" />
  <link rel="stylesheet" href="css/header.css" />
</head>

<body>

  <div id="header-container"></div>

  <div class="page">

    <div class="hist-filters">
      <div class="filter-chip active" onclick="filterHist(this)">1h</div>
      <div class="filter-chip" onclick="filterHist(this)">6h</div>
      <div class="filter-chip" onclick="filterHist(this)">24h</div>
      <div class="filter-chip" onclick="filterHist(this)">7 dias</div>
    </div>

    <div class="chart-card">
      <div class="chart-title">
        <span>Temperatura (°C)</span>
      </div>

      <div class="chart-wrap">
        <canvas id="chart-temp"></canvas>
        <div id="tooltip-temp" class="chart-tooltip"></div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">
        <span>Humidade (%)</span>
      </div>

      <div class="chart-wrap">
        <canvas id="chart-hum"></canvas>
        <div id="tooltip-hum" class="chart-tooltip"></div>
      </div>
    </div>

    <div class="sec-header" style="padding-top:1.25rem">Últimas leituras</div>
    <div class="hist-list" id="hist-list"></div>
  </div>

  <!-- Picker bottom sheet (partilhado) -->
  <div class="picker-overlay" id="picker-overlay" onclick="closeTerrarioPicker(event)">
    <div class="picker-sheet">
      <div class="picker-handle"></div>
      <div class="sel-label" style="padding:0 0 12px">Os meus terrários</div>
      <div class="picker-list" id="picker-list"></div>
      <button class="picker-add" onclick="addTerrario()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Novo terrário
      </button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/terrarios.js"></script>
  <script src="js/picker.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/historico.js"></script>

  <script>
    fetch("header.html")
    .then(r => r.text())
    .then(data => {
        document.getElementById("header-container").innerHTML = data;

        const pagina = window.location.pathname.split("/").pop() || "index.html";

        const titulos = {
            "index.html": "Início",
            "historico.html": "Histórico",
            "atividade.html": "Atividade",
            "alertas.html": "Alertas",
            "definicoes.html": "Definições",
            "profile.html": "Perfil"
        };

        const titulo = document.getElementById("page-title");
        if (titulo) {
            titulo.textContent = titulos[pagina] || "EasyBiome";
        }

        document.querySelectorAll(".desktop-nav-link").forEach(link => {
            if (link.getAttribute("href") === pagina) {
                link.classList.add("active");
            }
        });

        document.querySelectorAll(".bnav-item").forEach(link => {
            if (link.getAttribute("href") === pagina) {
                link.classList.add("active");
            }
        });
    });
  </script>

</body>

</html>
