<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EasyBiome — Atividade</title>

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/atividade.css">
    <link rel="stylesheet" href="css/header.css">
</head>

<body>

    <div id="header-container"></div>

    <div class="page">

        <!-- Pesquisa -->

        <div class="search-box">
            <input type="text" id="pesquisa" placeholder="Pesquisar dispositivo..." oninput="filtrarAtividade()">
        </div>

        <!-- Origem -->

        <div class="filters">

            <div class="filter-chip active" data-group="origem" data-value="TODOS" onclick="selecionarFiltro(this)">
                Todos
            </div>

            <div class="filter-chip" data-group="origem" data-value="APP" onclick="selecionarFiltro(this)">
                App
            </div>

            <div class="filter-chip" data-group="origem" data-value="AUTOMATICO" onclick="selecionarFiltro(this)">
                Automático
            </div>
        </div>

        <!-- Dispositivo -->

        <div class="filters">

            <div class="filter-chip active" data-group="dispositivo" data-value="TODOS"
                onclick="selecionarFiltro(this)">
                Todos
            </div>

            <div class="filter-chip" data-group="dispositivo" data-value="VENTOINHA" onclick="selecionarFiltro(this)">
                🌀 Ventoinha
            </div>

            <div class="filter-chip" data-group="dispositivo" data-value="LAMPADA_AQUECIMENTO"
                onclick="selecionarFiltro(this)">
                🔥 Aquecimento
            </div>

            <div class="filter-chip" data-group="dispositivo" data-value="LAMPADA_ILUMINACAO"
                onclick="selecionarFiltro(this)">
                💡 Luz
            </div>

            <div class="filter-chip" data-group="dispositivo" data-value="HUMIDIFICADOR"
                onclick="selecionarFiltro(this)">
                💧 Humidificador
            </div>

        </div>

        <div class="atividade-list" id="atividade-list">

            <div class="loading">
                A carregar atividade...
            </div>

        </div>

    </div>

    <!-- Picker -->

    <div class="picker-overlay" id="picker-overlay" onclick="closeTerrarioPicker(event)">
        <div class="picker-sheet">

            <div class="picker-handle"></div>

            <div class="sel-label">
                Os meus terrários
            </div>

            <div class="picker-list" id="picker-list"></div>

            <button class="picker-add" onclick="addTerrario()">
                Novo terrário
            </button>

        </div>
    </div>

    <script src="js/config.js"></script>

    <script src="js/terrarios.js"></script>
    <script src="js/picker.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/atividade.js"></script>

    <script>
        fetch("header.html")
    .then(r => r.text())
    .then(data => {
        document.getElementById("header-container").innerHTML = data;

        const pagina = window.location.pathname.split("/").pop() || "index.html";

        const titulos = {
            "index.html": "Início",
            "historico.html": "Histórico",
            "atividade.html": "Atividade",
            "alertas.html": "Alertas",
            "definicoes.html": "Definições",
            "profile.html": "Perfil"
        };

        const titulo = document.getElementById("page-title");
        if (titulo) {
            titulo.textContent = titulos[pagina] || "EasyBiome";
        }

        document.querySelectorAll(".desktop-nav-link").forEach(link => {
            if (link.getAttribute("href") === pagina) {
                link.classList.add("active");
            }
        });

        document.querySelectorAll(".bnav-item").forEach(link => {
            if (link.getAttribute("href") === pagina) {
                link.classList.add("active");
            }
        });
    });
    </script>

</body>

</html>
