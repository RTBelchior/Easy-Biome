<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>EasyBiome</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="desktop-topbar">
  <a class="top-logo" href="index.html">
  <div class="logo-box">
    <img src="imagens/logotipo.png" alt="EasyBiome Logo">
  </div>
</a>
  <div class="desktop-topbar-links">
    <a class="desktop-nav-link" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Início
    </a>
    <a class="desktop-nav-link" href="historico.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Histórico
    </a>
    <a class="desktop-nav-link" href="alertas.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Alertas
    </a>
    <a class="desktop-nav-link" href="definicoes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Definições
    </a>
  </div>
  <a class="desktop-nav-link" href="profile.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Perfil
  </a>

<div class="page">
    <div class="top-bar">
      <a class="top-logo" href="index.html">
        <div class="logo-box">
          <img src="imagens/logotipo.png" alt="EasyBiome Logo">
        </div>
      </a>

      <div class="top-bar-title">Alertas</div>
      
      <button class="icon-btn" onclick="openTerrarioPicker()" aria-label="Trocar terrário">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M16 3h5v5M21 3l-7 7" />
          <path d="M8 21H3v-5M3 21l7-7" />
          <path d="M21 16v5h-5M21 21l-7-7" />
          <path d="M3 8V3h5M3 3l7 7" />
        </svg>
      </button>
    </div>

  <div class="terrario-hero" id="terrario-hero">
    <img id="terrario-img" class="terrario-hero-img" src="" alt=""/>
    <div class="terrario-hero-overlay"></div>
    <div class="terrario-hero-content">
      <div class="terrario-hero-name" id="terrario-name"></div>
      <div class="terrario-hero-meta">Atualizado agora</div>
    </div>
    <button class="terrario-hero-switch" onclick="openTerrarioPicker()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M21 3l-7 7"/><path d="M8 21H3v-5M3 21l7-7"/><path d="M21 16v5h-5M21 21l-7-7"/><path d="M3 8V3h5M3 3l7 7"/></svg>
    </button>
  </div>

  <div class="metrics">
    <div class="m-card" id="temp-card">
      <div class="m-lbl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>Temp.</div>
      <div class="m-val ok" id="temp-val">--<span class="unit">°C</span></div>
      <div class="m-hint" id="temp-hint"></div>
    </div>
    <div class="m-card" id="hum-card">
      <div class="m-lbl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6 10 4 14 4 16a8 8 0 0 0 16 0c0-2-2-6-8-14z"/></svg>Humidade</div>
      <div class="m-val ok" id="hum-val">--<span class="unit">%</span></div>
      <div class="m-hint" id="hum-hint"></div>
    </div>
  </div>

  <div class="sec-header">Dispositivos</div>
  <div class="devices">
    <div class="dev-row">
      <div class="dev-icon" id="fan-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M12 10c0-3.5-2-6-4-6s-3 2.5-2 5 3.5 3 6 3"/><path d="M14 12c3.5 0 6 2 6 4s-2.5 3-5 2-3-3.5-3-6"/><path d="M12 14c0 3.5 2 6 4 6s3-2.5 2-5-3.5-3-6-3"/><path d="M10 12c-3.5 0-6-2-6-4s2.5-3 5-2 3 3.5 3 6"/></svg></div>
      <div class="dev-info"><div class="dev-name">Ventoinha</div><div class="dev-sub" id="fan-sub"></div></div>
      <button class="toggle" id="fan-t" onclick="toggleDev('fan')" aria-label="Ventoinha"></button>
    </div>
    <div class="dev-row">
      <div class="dev-icon" id="heat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 6-4 8-4 13a4 4 0 0 0 8 0c0-5-4-7-4-13z"/><path d="M9.5 9c0 4-2.5 5-2.5 8.5a5 5 0 0 0 10 0C17 14 14 13 14 9"/></svg></div>
      <div class="dev-info"><div class="dev-name">Lâmpada Aquecimento</div><div class="dev-sub" id="heat-sub"></div></div>
      <button class="toggle" id="heat-t" onclick="toggleDev('heat')" aria-label="Aquecimento"></button>
    </div>
    <div class="dev-row">
      <div class="dev-icon" id="light-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg></div>
      <div class="dev-info"><div class="dev-name">Lâmpada Iluminação</div><div class="dev-sub" id="light-sub"></div></div>
      <button class="toggle" id="light-t" onclick="toggleDev('light')" aria-label="Iluminação"></button>
    </div>
  </div>
</div>

<!-- Picker bottom sheet (partilhado) -->
<div class="picker-overlay" id="picker-overlay" onclick="closeTerrarioPicker(event)">
  <div class="picker-sheet">
    <div class="picker-handle"></div>
    <div class="sel-label" style="padding:0 0 12px">Os meus terrários</div>
    <div class="picker-list" id="picker-list"></div>
    <button class="picker-add" onclick="addTerrario()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo terrário
    </button>
  </div>
</div>

<nav class="bottom-nav">
  <a class="bnav-item active" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

    Histórico
  </a>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    Alertas
  </a>
  <a class="bnav-item" href="definicoes.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Definições
  </a>
</nav>

<script src="js/terrarios.js"></script>
<script src="js/picker.js"></script>
<script src="js/nav.js"></script>
<script src="js/home.js"></script>
</body>
</html>
