<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>EasyBiome — Definições</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="page">
  <div class="top-bar">
    <div class="top-bar-title">Definições</div>
    <button class="icon-btn" onclick="openTerrarioPicker()" aria-label="Trocar terrário">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M21 3l-7 7"/><path d="M8 21H3v-5M3 21l7-7"/><path d="M21 16v5h-5M21 21l-7-7"/><path d="M3 8V3h5M3 3l7 7"/></svg>
    </button>
  </div>

  <div class="profile-card">
    <div class="profile-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
    <div><div class="profile-name">Admin</div><div class="profile-email">admin@easybiome.pt</div></div>
    <div class="profile-edit">Editar</div>
  </div>

  <div class="settings-section" style="margin-top:1.25rem">
    <div class="settings-section-title">Terrário ativo</div>
    <div class="settings-group">
      <div class="settings-row">
        <div class="settings-row-left">
          <div class="settings-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>
          <div><div class="settings-row-name">Nome</div></div>
        </div>
        <div class="settings-val" id="set-nome">—</div>
      </div>
      <div class="settings-row">
        <div class="settings-row-left">
          <div class="settings-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg></div>
          <div><div class="settings-row-name">Temperatura</div><div class="settings-row-sub">Limites de alerta</div></div>
        </div>
        <div class="settings-val" id="set-temp">—</div>
      </div>
      <div class="settings-row">
        <div class="settings-row-left">
          <div class="settings-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6 10 4 14 4 16a8 8 0 0 0 16 0c0-2-2-6-8-14z"/></svg></div>
          <div><div class="settings-row-name">Humidade</div><div class="settings-row-sub">Limites de alerta</div></div>
        </div>
        <div class="settings-val" id="set-hum">—</div>
      </div>
      <div class="settings-row">
        <div class="settings-row-left">
          <div class="settings-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/></svg></div>
          <div><div class="settings-row-name">IP do ESP32</div></div>
        </div>
        <div class="settings-val">192.168.1.42</div>
      </div>
    </div>
  </div>

  <div class="settings-section" style="margin-top:1.25rem">
    <div class="settings-section-title">Conta</div>
    <div class="settings-group">
      <div class="settings-row" style="cursor:pointer">
        <div class="settings-row-left">
          <div class="settings-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
          <div><div class="settings-row-name">Partilhar terrário</div></div>
        </div>
        <div class="settings-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="settings-row" style="cursor:pointer">
        <div class="settings-row-left">
          <div class="settings-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
          <div><div class="settings-row-name">Alterar password</div></div>
        </div>
        <div class="settings-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="settings-row" style="cursor:pointer">
        <div class="settings-row-left">
          <div class="settings-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
          <div><div class="settings-row-name" style="color:var(--red)">Terminar sessão</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Picker bottom sheet (partilhado) -->
<div class="picker-overlay" id="picker-overlay" onclick="closeTerrarioPicker(event)">
  <div class="picker-sheet">
    <div class="picker-handle"></div>
    <div class="sel-label" style="padding:0 0 12px">Os meus terrários</div>
    <div class="picker-list" id="picker-list"></div>
    <button class="picker-add" onclick="addTerrario()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo terrário
    </button>
  </div>
</div>

<nav class="bottom-nav">
  <a class="bnav-item" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Início
  </a>
  <a class="bnav-item" href="historico.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Histórico
  </a>
  <a class="bnav-item" href="alertas.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    Alertas
  </a>
  <a class="bnav-item active" href="definicoes.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Definições
  </a>
</nav>

<script src="js/terrarios.js"></script>
<script src="js/picker.js"></script>
<script src="js/definicoes.js"></script>
</body>
</html>
